<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Cape Spear lighthouse on the cliffs">
  <defs>
    <linearGradient id="cs-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6f8ef"/>
      <stop offset="1" stop-color="#fff0f8"/>
    </linearGradient>
    <linearGradient id="cs-sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb3dd"/>
      <stop offset="1" stop-color="#ff94cb"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#cs-sky)"/>
  <circle cx="640" cy="120" r="50" fill="#00a859" opacity="0.35"/>
  <rect x="0" y="360" width="800" height="140" fill="url(#cs-sea)"/>
  <!-- cliff -->
  <path d="M0 380 Q 200 330 380 370 L 380 500 L 0 500 Z" fill="#06351f"/>
  <path d="M0 400 Q 200 360 380 392 L 380 500 L 0 500 Z" fill="#0a4d2c"/>
  <!-- lighthouse -->
  <g transform="translate(150,180)">
    <rect x="0" y="40" width="60" height="160" fill="#fff" stroke="#d9cfc2" stroke-width="2"/>
    <rect x="0" y="40" width="60" height="26" fill="#f24aa3"/>
    <rect x="0" y="92" width="60" height="26" fill="#f24aa3"/>
    <rect x="0" y="144" width="60" height="26" fill="#f24aa3"/>
    <polygon points="-8,40 68,40 30,8" fill="#00a859"/>
    <rect x="20" y="14" width="20" height="22" fill="#ffd166"/>
  </g>
</svg>
