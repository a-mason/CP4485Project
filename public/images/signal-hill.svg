<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Cabot Tower on Signal Hill overlooking the harbour">
  <defs>
    <linearGradient id="sh-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe3f1"/>
      <stop offset="1" stop-color="#fbf8f3"/>
    </linearGradient>
    <linearGradient id="sh-sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7ad0a3"/>
      <stop offset="1" stop-color="#00a859"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sh-sky)"/>
  <circle cx="150" cy="110" r="54" fill="#ff94cb" opacity="0.55"/>
  <!-- sea -->
  <rect x="0" y="330" width="800" height="170" fill="url(#sh-sea)"/>
  <!-- hill -->
  <path d="M0 360 Q 260 200 520 300 Q 660 350 800 280 L 800 500 L 0 500 Z" fill="#06351f"/>
  <path d="M0 380 Q 260 240 520 330 Q 660 380 800 320 L 800 500 L 0 500 Z" fill="#0a4d2c"/>
  <!-- Cabot Tower -->
  <g transform="translate(470,150)">
    <rect x="0" y="40" width="70" height="120" fill="#7a5a3c"/>
    <rect x="-12" y="0" width="44" height="60" fill="#8a6a4c"/>
    <rect x="-12" y="-14" width="10" height="16" fill="#8a6a4c"/>
    <rect x="6" y="-14" width="10" height="16" fill="#8a6a4c"/>
    <rect x="24" y="-14" width="10" height="16" fill="#8a6a4c"/>
    <rect x="2" y="20" width="16" height="22" fill="#06351f"/>
  </g>
</svg>
