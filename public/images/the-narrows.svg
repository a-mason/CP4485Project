<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Boats passing through The Narrows into St. John's harbour">
  <defs>
    <linearGradient id="nr-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff0f8"/>
      <stop offset="1" stop-color="#e6f8ef"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#nr-sky)"/>
  <circle cx="400" cy="110" r="46" fill="#ffd9ee"/>
  <!-- hills framing the narrows -->
  <path d="M0 300 Q 120 160 240 320 L 240 500 L 0 500 Z" fill="#06351f"/>
  <path d="M800 300 Q 680 160 560 320 L 560 500 L 800 500 Z" fill="#0a4d2c"/>
  <!-- water -->
  <rect x="0" y="360" width="800" height="140" fill="#00a859"/>
  <rect x="0" y="360" width="800" height="20" fill="#7ad0a3" opacity="0.6"/>
  <!-- boats -->
  <g transform="translate(330,330)">
    <polygon points="0,40 90,40 78,70 12,70" fill="#f24aa3"/>
    <rect x="40" y="6" width="6" height="36" fill="#06351f"/>
    <polygon points="46,8 80,38 46,38" fill="#fff"/>
  </g>
  <g transform="translate(440,350)">
    <polygon points="0,30 64,30 54,52 10,52" fill="#4dabf7"/>
    <rect x="28" y="4" width="5" height="28" fill="#06351f"/>
    <polygon points="33,6 58,30 33,30" fill="#ffd166"/>
  </g>
</svg>
